# Chaque entrée décrit comment récupérer le niveau d'un sous-jacent et le stocker
# dans un fichier YAML dédié : underlying_<underlying_id_sanitized>.yaml
#
# Remarque:
# - Certaines sources (ex: CMS via sites bancaires) peuvent être derrière des murs de consentement/compliance.
# - Les fetchers implémentés ici visent des pages accessibles publiquement (Solactive / Euronext / MerQube / Natixis).

underlyings:
