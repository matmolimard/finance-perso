nav_sources:
  # Eleva Absolute Return Europe A1 EUR Acc (LU1331971769)
  # Source: https://www.quantalys.com/Fonds/405242
  uc_eleva_absolute_return_europe:
    kind: html_regex
    url: "https://www.quantalys.com/Fonds/405242"
    # Extrait "Valeur liquidative 153,58 EUR" ou "1 777,236 EUR" (gère les espaces dans les nombres)
    value_regex: "Valeur\\s+liquidative[\\s\\S]{0,200}?([0-9]+(?:\\s+[0-9]+)*[\\.,][0-9]+)\\s*EUR"
    # Extrait "22/12/2025"
    date_regex: "Valeur\\s+liquidative[\\s\\S]{0,400}?([0-9]{2}/[0-9]{2}/[0-9]{4})"
    date_format: "%d/%m/%Y"
    currency: "EUR"
    headless: true

