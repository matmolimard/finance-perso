services:
  portfolio-tracker:
    build:
      context: .
      dockerfile: Dockerfile
    image: portfolio-tracker:latest
    container_name: portfolio-tracker
    working_dir: /app
    env_file:
      - .env
    restart: unless-stopped
    volumes:
      # Persist and edit business data directly from host.
      - ./portfolio_tracker/data:/app/portfolio_tracker/data
    ports:
      - "127.0.0.1:8765:8765"
    command: ["web", "--host", "0.0.0.0", "--port", "8765"]
